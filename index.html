<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/market-moves.ico" type="image/x-icon">
    <title>Market Moves</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="layout.css">
    <link rel="stylesheet" href="buttons.css">
    <link rel="stylesheet" href="overlay.css">
  </head>
  <body>
    <div id="content" class="flex vertical">
      <div class="section flex horizontal">
        <div class="page-header"><h1><img src="assets/market-moves-transparent.png" class="main-icon">Market Moves <span class="small">v0.1</span></h1></div>
        <div class="page-header" style="margin-left: auto"><h1>Day <span data-bind="days"></span></h1></div>
        <div class="page-header"><h1>$<span data-bind="capital"></span></h1></div>
      </div>

      <div id="main" class="section flex vertical">
        <div id="info" class="panel flex vertical">
          <div class="panel flex horizontal">
            <div id="quantity-graph"></div>
            <div id="profit-graph"></div>
            <div id="history-graph"></div>
          </div>
          <div class="panel flex horizontal">
            <div>
              Fixed Cost:<br>
              Base Cost:<br>
              Marginal Cost:<br>
              Current Market Price:
            </div>
            <div>
              $<span data-bind="fixed_cost"></span><br>
              $<span data-bind="base_cost"></span><br>
              $<span data-bind="marginal_cost"></span><br>
              $<span data-bind="market_price"></span>
            </div>
          </div>
        </div>
        
        <div id="controls" class="panel flex horizontal">
          <div class="control flex horizontal">
            <button class="btn down" onclick="decrement_qs()"></button>
            <div class="control-info flex vertical">
              <div class="control-info title">
                Quantity<br>Supplied
              </div>
              <div class="control-info data" id="quantity-supplied">
                <span data-bind="qs" contenteditable></span>cars/day
              </div>
              <div class="control-info data" id="qs-range">
                1-<span data-bind="qs_max"></span>
              </div>
            </div>
            <button class="btn up" onclick="increment_qs()"></button>
          </div>
          <div class="control flex horizontal">
            <button class="btn ntrl flex vertical" onclick="upgrade_factory()">
              <div>Upgrade Factory</div>
              <div>$<span data-bind="factory_upgrade_cost"></span></div>
              <div><small>Reduces Marginal Cost by 10%</small></div>
            </button>
          </div>
          <div class="control flex horizontal">
            <button class="btn ntrl flex vertical" onclick="better_materials()">
              <div>Better Materials</div>
              <div>$<span data-bind="better_materials_cost"></span></div>
              <div><small>Reduces Base Cost by 1%</small></div>
            </button>
          </div>
        </div>
      </div>

      <dialog id="dialog">
        <div class="flex vertical">
          <h2>Market Moves</h2>
          <p>This is a hard game.</p>
          <button class="btn ntrl" onclick="document.querySelector('#dialog').close()">Ok</button>
        </div>
      </dialog>

      <div id="footer" class="section">
        Programming by Frederick Ziola. Game design by Frederick Ziola and Stone Sweezea.
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/function-plot@1.21.0/dist/function-plot.min.js"></script>
    <script src="index.js"></script>
  </body>
</html>
